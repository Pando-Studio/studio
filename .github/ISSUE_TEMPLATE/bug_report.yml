name: Bug Report
description: Report a bug in Qiplim
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened.
    validations:
      required: true
  - type: dropdown
    id: app
    attributes:
      label: App
      options:
        - Studio
        - Engage
        - Both
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Browser, OS, error logs, screenshots, etc.
